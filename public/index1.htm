<!DOCTYPE html>
<html lang="en"dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            background-color: #4f46e5;
            justify-content: center;
           opacity: 0;
           animation: fadeIn 3s ease forwards;
            background-repeat: no-repeat;
            align-items: center;
            background-size: cover;
            height: 100vh;
            padding: 20px;

        }
       @keyframes fadeIn{
        to{
            opacity: 1;
        }
       }
        .c{
            background:rgb(247, 247, 247);
            background-repeat: no-repeat;
            background-size: cover;
            width:50%; 
            height: 80%;
            padding:24px;
            border-radius:15px;
            text-align: center;
        }
        h1{
             margin:0 0 16px;
             font-size:20px;
             text-align:center;
        }
        label{
             font-size:14px;
             font-weight: bold;
             margin-bottom:6px;
             margin-right: 10%;
             text-align:right;
             display:block;
    }
        input{
           
             width:77%;
             padding:10px 12px;
             border:none #d1d5db;
             border-width: 1px;
             border-radius:8px;
             margin-bottom:14px;
             font-size:14px;
    }
   
        button.aw{
             width: 35%;
             padding:10px;
             border:0;
             border-radius:8px;
             background:#07e73f;
             color:white;
             font-size:15px;
             margin-left: 10%;
             margin-top: 1.5rem;

    }
    
        button.aw:hover{
             border-radius: 10px;
             background-color: #099232;
             font-size: 20px;
            
    }
       button.ay{
             width: 35%;
             padding:10px;
             border:0;
             border-radius:8px;
             background:#da0b0b;
             color:white;
             font-size:15px;
             margin-top: 1.5rem;

      
    }
    a{
        
        text-decoration: none;
        color: white;
    }
        button.ay:hover{
             border-radius: 10px;
             background-color: #5a0808;
             font-size: 20px;
    }
    </style>
</head>
<body>
    <div class="c">
    <h1>ثبت نام</h1>

    <form>
        <label for="text">نام</label>
        <input type="text" placeholder="نام(اجباری)">
        <label for="text">نام خانوادگی</label>
        <input type="text" placeholder="نام خانوادگی(اختیاری)">
        <label for="text">شماره همراه</label>
        <input type="text" placeholder="09*********">

      <label for="email">ایمیل</label>
      <input type="email"  placeholder="name@example.com">

      <label for="password">رمز عبور</label>
      <input type="password"  placeholder="*****">
        
      <label>
        <input type="checkbox" style="width:auto;margin:0;"> مرا به خاطر بسپار
      </label>

      <button type="submit" class="aw">ورود</button>
      <a href="index.htm"><button type="submit" class="ay">بازگشت</a></button>
    </form>
</body>
</html>
